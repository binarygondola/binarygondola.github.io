<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Noc Muzeów - Mapa Offline</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 1. Inicjalizacja Mapy (środek ustawiony na Warszawę)
        const map = L.map('map', {
            zoomControl: false // wyłączamy domyślne przyciski, bo na telefonie steruje się gestami
        }).setView([52.2297, 21.0122], 12);

        // Dodanie przycisków zoomu w prawym dolnym rogu, by nie przeszkadzały palcom
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 2. Warstwa kafelków mapy
        // Leaflet domyślnie pobiera kafelki z sieci. 
        // UWAGA OFFLINE: Przeglądarka zapamięta ostatnio przeglądane rejony mapy. 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. Wczytywanie danych muzeów z pliku JSON
        fetch('muzea.json')
            .then(response => response.json())
            .then(data => {
                data.forEach(muzeum => {
                    if (muzeum.lat && muzeum.lng) {
                        
                        // Formatowanie okienka popup zoptymalizowane pod ekrany dotykowe
                        const trescPopup = `
                            <div style="line-height: 1.4; max-width: 220px;">
                                <h3 style="margin: 0 0 4px 0; font-size: 14px; color: #2c3e50;">${muzeum.wystawa}</h3>
                                <p style="margin: 0 0 4px 0; font-weight: bold; color: #7f8c8d; font-size: 11px;">🏢 ${muzeum.miejsce}</p>
                                <p style="margin: 0 0 4px 0; font-size: 11px; color: #16a085;"><b>🕒 Godziny:</b> ${muzeum.godziny}</p>
                                <p style="margin: 0; font-size: 10px; color: #555; border-top: 1px solid #eee; padding-top: 4px;">📍 ${muzeum.adres}</p>
                            </div>
                        `;

                        L.marker([muzeum.lat, muzeum.lng])
                            .addTo(map)
                            .bindPopup(trescPopup);
                    }
                });
            })
            .catch(error => console.error('Błąd ładowania punktów:', error));
    </script>
</body>
</html>
